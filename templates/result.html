<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explanation — ReportAI</title>
  <link rel="stylesheet" href="/static/style.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
</head>
<body>

<div class="bg-texture"></div>
<div id="canvas-container"></div>

<div class="page">
  <nav class="navbar stagger-1">
    <a href="/" class="nav-brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#brandGrad)" stroke-width="2.5"><linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#c084fc"/></linearGradient><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      ReportAI
    </a>
    
    <div class="nav-center">
      <a href="/history" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v10l4 2"/><circle cx="12" cy="12" r="10"/></svg>
        History
      </a>
    </div>

    <div class="nav-right">
      <a href="/" class="nav-link">New Report</a>
      <a href="/logout" class="btn btn-ghost btn-sm">Log out</a>
    </div>
  </nav>

  <div class="container-md stagger-2">
    
    <div class="result-header">
      <div class="badge-success">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        Explanation Ready
      </div>
      <h1 class="hero-title" style="font-size: clamp(2.5rem, 5vw, 3.5rem); margin-bottom: 0;">Report Analysis</h1>
      
      <div class="result-filename glass glow-hover">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        {{ filename }}
      </div>
    </div>

    <!-- TABS -->
    <div class="result-tabs stagger-3">
      <button class="result-tab active" data-tab="english">🇬🇧 English</button>
      <button class="result-tab" data-tab="gujarati">🇮🇳 ગુજરાતી</button>
    </div>

    <!-- PANELS -->
    <div class="stagger-3">
      <div class="gradient-border-wrap" style="padding: 1px;">
        <div class="gradient-border-inner glass" style="padding: 4px; border: 1px solid var(--border);">
          <div id="panel-english" class="result-panel active">
            <div class="result-content">{{ english }}</div>
          </div>
  
          <div id="panel-gujarati" class="result-panel">
            <div class="result-content gujarati">{{ gujarati }}</div>
          </div>
        </div>
      </div>
    </div>

    <div style="display: flex; gap: 16px; margin-top: 40px; justify-content: center; margin-bottom: 100px;" class="stagger-4">
      <a href="/" class="btn btn-primary btn-lg">Explain Another</a>
      <a href="/history" class="btn btn-ghost btn-lg">View History</a>
    </div>

  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — ReportAI</title>
  <link rel="stylesheet" href="/static/style.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js" defer></script>
</head>
<body>

<div class="bg-texture"></div>
<div id="canvas-container"></div>

<div class="page">
  <nav class="navbar stagger-1">
    <a href="/" class="nav-brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#brandGrad)" stroke-width="2.5"><linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#c084fc"/></linearGradient><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      ReportAI
    </a>
    
    <div class="nav-right">
      <a href="/login" class="btn btn-ghost btn-sm">Log in</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="gradient-border-wrap stagger-2">
      <div class="gradient-border-inner glass auth-card">
        
        <div class="auth-icon glow-hover" style="color: var(--accent2);">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        </div>
        
        <h1 class="auth-title">Create account</h1>
        <p class="auth-sub" style="color: #6ee7b7;">2 free reports, no card needed</p>

        {% if error %}
        <div class="alert alert-error">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          {{ error }}
        </div>
        {% endif %}

        <form action="/signup" method="POST">
          <div class="form-group">
            <label class="form-label">Name</label>
            <input class="form-input" type="text" name="name" placeholder="John Doe" required autocomplete="name">
          </div>
          <div class="form-group">
            <label class="form-label">Email address</label>
            <input class="form-input" type="email" name="email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" name="password" placeholder="Min. 6 characters" required autocomplete="new-password">
          </div>
          
          <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top: 12px;">
            Create account
          </button>
        </form>

        <div class="auth-divider">
          Already have an account? <a href="/login">Log in</a>
        </div>
        
      </div>
    </div>
  </div>

  <footer class="footer container stagger-3">
    <div class="footer-content" style="justify-content: center;">
      <div class="footer-brand">ReportAI © 2026</div>
    </div>
  </footer>
</div>

<script src="/static/script.js"></script>
</body>
</html>

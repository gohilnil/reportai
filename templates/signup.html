<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — ArogyaAI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="bg-scene">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
</div>

<div class="page">
  {% set active_page = 'signup' %}
  {% include 'includes/navbar.html' %}

  <main class="auth-page animate-in">
    <div class="auth-card card-3d">
      <div class="card-glow-overlay"></div>
      
      <div class="auth-icon" style="color:var(--status-low); background:rgba(16,185,129,0.1); border-color:rgba(16,185,129,0.2);">🚀</div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-sub">Get free tokens to analyze your first reports.</p>

      {% if error %}
      <div class="alert alert-error">
        <span class="alert-icon">⚠️</span>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <a href="/login/google" class="google-btn">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="22" height="22" alt="Google">
        Sign up with Google
      </a>

      <div class="divider">or use email</div>

      <form action="/signup" method="POST" class="auth-form">
        <div class="form-group">
          <label for="name" class="form-label">Full Name</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="e.g. Rahul Sharma" required minlength="2">
        </div>
        
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Create Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top:8px;">Sign Up Free →</button>
      </form>

      <div class="auth-divider">
        Already have an account? <a href="/login">Log in</a>
      </div>
    </div>
  </main>

</div>

<script src="/static/script.js"></script>
</body>
</html>

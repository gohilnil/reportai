<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ArogyaAI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="bg-scene">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
</div>

<div class="page">
  {% set active_page = 'login' %}
  {% include 'includes/navbar.html' %}

  <main class="auth-page animate-in">
    <div class="auth-card card-3d">
      <div class="card-glow-overlay"></div>
      
      <div class="auth-icon">🔑</div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Log in to view your reports and history.</p>

      {% if error %}
      <div class="alert alert-error">
        <span class="alert-icon">⚠️</span>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <a href="/login/google" class="google-btn">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="22" height="22" alt="Google">
        Continue with Google
      </a>

      <div class="divider">or</div>

      <form action="/login" method="POST" class="auth-form">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top:8px;">Sign In →</button>
      </form>

      <div class="auth-divider">
        Don't have an account? <a href="/signup">Sign up for free</a>
      </div>
    </div>
  </main>

</div>

<script src="/static/script.js"></script>
</body>
</html>
